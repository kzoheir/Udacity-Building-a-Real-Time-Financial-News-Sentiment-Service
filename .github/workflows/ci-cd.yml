name: test-and-deploy

on:
  push:
    branches: [main]

# Before this pipeline can deploy, the following AWS resources must exist:
# 1. An ECR repository named finbert-api
# 2. An ECS cluster named finbert-cluster
# 3. An ECS service named finbert-api-service running on that cluster
# 4. An ECS task definition named finbert-api
# Plus these GitHub repository secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
# AWS_SESSION_TOKEN, AWS_REGION, ECR_REGISTRY.
env:
  ECR_REPOSITORY: finbert-api
  TASK_DEFINITION: finbert-api
  CONTAINER_NAME: finbert-api
  ECS_SERVICE: finbert-api-service
  ECS_CLUSTER: finbert-cluster
  HF_MODEL_ID: baptle/FinBERT_market_based
  HF_DATASET_ID: baptle/financial_headlines_market_based

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/ scripts/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      MODEL_SOURCE: huggingface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-model-${{ env.HF_MODEL_ID }}
      # Downloads the model and patches a known bug in its config.json (id2label
      # stored as floats instead of strings, which newer transformers versions reject).
      - name: Download and patch model
        run: python scripts/smoke_test.py
      - name: Run integration tests
        run: pytest tests/ -v

  deepchecks:
    runs-on: ubuntu-latest
    needs: lint
    env:
      MODEL_SOURCE: huggingface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-model-${{ env.HF_MODEL_ID }}
      - name: Download and patch model
        run: python scripts/smoke_test.py
      - name: Generate data with DVC
        run: dvc repro
      - name: Run deepchecks drift gate
        run: python scripts/run_deepchecks.py

  build:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: [test, deepchecks]
    outputs:
      image-tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "tag=$(git rev-parse --short HEAD)-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --query taskDefinition > task-definition.json

      # Reuses the exact tag the build job just pushed (needs.build.outputs.image-tag) —
      # recomputing a fresh timestamp here would reference an image that was never pushed.
      - name: Render new task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ needs.build.outputs.image-tag }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
